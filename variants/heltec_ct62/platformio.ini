[env:Heltec_ct62_repeater_bridge_espnow]
extends = Heltec_ct62
build_flags =
  ${Heltec_ct62.build_flags}
  -D ADVERT_NAME='"ESPNow Bridge"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D WITH_ESPNOW_BRIDGE=1
;  -D BRIDGE_DEBUG=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Heltec_ct62.build_src_filter}
  +<helpers/bridges/ESPNowBridge.cpp>
  +<../examples/simple_repeater>
lib_deps =
  ${Heltec_ct62.lib_deps}
  ${esp32_ota.lib_deps}

[env:Heltec_ct62_companion_radio_usb]
extends = Heltec_ct62
build_flags =
  ${Heltec_ct62.build_flags}
;  -D ARDUINO_USB_MODE=1
;  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Heltec_ct62.build_src_filter}
  +<../examples/companion_radio/*.cpp>
lib_deps =
  ${Heltec_ct62.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:Heltec_ct62_companion_radio_ble]
extends = Heltec_ct62
build_flags =
  ${Heltec_ct62.build_flags}
;  -D ARDUINO_USB_MODE=1
;  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  -D BLE_PIN_CODE=123456
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Heltec_ct62.build_src_filter}
  +<../examples/companion_radio/*.cpp>
  +<helpers/esp32/SerialBLEInterface.cpp>
lib_deps =
  ${Heltec_ct62.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:Heltec_ct62_sensor]
extends = Heltec_ct62
build_flags =
  ${Heltec_ct62.build_flags}
  -D ADVERT_NAME='"HT-CT62 Sensor"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D PIN_BOARD_SDA=-1
  -D PIN_BOARD_SCL=-1
  -D PIN_BOARD_RELAY_CH1=0
  -D PIN_BOARD_RELAY_CH2=1
  -D PIN_BOARD_DIGITAL_IN=19
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${Heltec_ct62.build_src_filter}
  +<../examples/simple_sensor>
lib_deps =
  ${Heltec_ct62.lib_deps}
  ${esp32_ota.lib_deps}

[env:Heltec_ct62_repeater_observer_mqtt]
extends = Heltec_ct62
extra_scripts =
  ${esp32_base.extra_scripts}
  pre:scripts/generate_cert_bundle.py
board_ssl_cert_source = adafruit
board_build.embed_files = src/certs/x509_crt_bundle.bin
build_flags =
  ${Heltec_ct62.build_flags}
  -D ADVERT_NAME='"Heltec CT62 MQTT Observer"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D WITH_MQTT_BRIDGE=1
  -D MAX_MQTT_BROKERS=3
  -D MQTT_MAX_PACKET_SIZE=1024
  -D MQTT_DEBUG=1
  -D MQTT_MEMORY_DEBUG=1
; Keep default observer profile less verbose to reduce runtime contention.
  -D MESH_PACKET_LOGGING=1
  -D MESH_DEBUG=1
  -D CONFIG_MBEDTLS_CERTIFICATE_BUNDLE=y
  -D ESP32_CPU_FREQ=160
  -D MQTT_WIFI_TX_POWER=WIFI_POWER_11dBm
  -D WITH_SNMP=1
#  -D WIFI_SSID='"ssid"'
#  -D WIFI_PWD='"password"'
#  -D MQTT_SERVER='"your-mqtt-broker.com"'
#  -D MQTT_PORT=1883
#  -D MQTT_USERNAME='"your-username"'
#  -D MQTT_PASSWORD='"your-password"'
build_src_filter = ${Heltec_ct62.build_src_filter}
  +<helpers/bridges/MQTTBridge.cpp>
  +<helpers/MQTTMessageBuilder.cpp>
  +<helpers/JWTHelper.cpp>
  +<helpers/SNMPAgent.cpp>
  +<../examples/simple_repeater>
lib_deps =
  ${Heltec_ct62.lib_deps}
  ${esp32_ota.lib_deps}
  elims/PsychicMqttClient@^0.2.4
  bblanchon/ArduinoJson
  arduino-libraries/NTPClient
  JChristensen/Timezone
  0neblock/SNMP_Agent
  paulstoffregen/Time@1.6.1
